apis:
- aid: banksa:banksa-cdr-product-reference-data-api
  name: BankSA CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksa.com.au/online-services/open-banking/product-api
  baseURL: https://digital-api.banksa.com.au/cds-au/v1/banking/products
  properties:
  - url: https://www.banksa.com.au/online-services/open-banking
    type: Documentation
  - url: https://www.banksa.com.au/online-services/open-banking/product-api
    type: APIReference
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: Specification
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    surface covering Get Products (GET /banking/products) and Get Product Detail (GET
    /banking/products/{productId}). BankSA documents the base URI as
    https://digital-api.banksa.com.au/cds-au/v1/banking/products/ and states no security
    or headers are required - available to everyone with no restrictions on use. Confirmed
    live returning HTTP 200 with an x-v response header (product list supports versions 4
    and 5; product detail supports 6 and 7) and a data.products array of banking products
    across transaction and savings accounts, home loans, and credit cards. Conforms to the
    DSB Consumer Data Standards CDR Banking API contract.
- aid: banksa:banksa-cdr-accounts-balances-api
  name: BankSA CDR Accounts & Balances API
  tags:
  - CDR
  - Open Banking
  - Accounts
  - Balances
  - Banking
  - Consumer Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.banksa.com.au/online-services/open-banking
  baseURL: https://digital-api.banksa.com.au/cds-au/v1/banking/accounts
  properties:
  - url: https://www.banksa.com.au/online-services/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-accounts
    type: Specification
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right endpoints for account and balance
    data sharing - Get Accounts (GET /banking/accounts), Get Account Detail (GET
    /banking/accounts/{accountId}), Get Bulk Balances (GET /banking/accounts/balances) and
    Get Account Balance (GET /banking/accounts/{accountId}/balance). Unlike the public PRD
    surface, these require an accredited data recipient (ADR) acting on the consumer's
    behalf with OAuth2 / OpenID Connect (FAPI) authorization and explicit consent captured
    in the customer's Internet Banking data sharing dashboard. Standardized by the DSB
    Consumer Data Standards CDR Banking API (v1.36.0) and legally required of BankSA as an
    accredited data holder within the Westpac Group.
