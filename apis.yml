name: BankSA
kind: company
description: BankSA is a South Australian retail and business banking brand operating
  as a division of Westpac Banking Corporation (ABN 33 007 457 141, AFSL and Australian
  credit licence 233714). It is not a mutual or independent ADI - it shares the Westpac
  Group core banking platform alongside sibling brands St.George and Bank of Melbourne.
  Under Australia's Consumer Data Right (CDR / Open Banking) regime, BankSA exposes a
  live, public, unauthenticated Product Reference Data (PRD) API conforming to the DSB
  Consumer Data Standards, hosted at digital-api.banksa.com.au. Consumer and account
  data sharing beyond product reference data runs on the accredited-data-recipient (ADR)
  model with OAuth2 / OpenID Connect (FAPI) authorization; BankSA does not publish an
  open self-service developer portal for third-party integration outside the CDR channel.
