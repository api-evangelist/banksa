apis:
- aid: banksa:banksa-cdr-product-reference-data-api
  name: BankSA CDR Product Reference Data API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
  baseURL: https://digital-api.banksa.com.au/cds-au/v1
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-products
    type: APIReference
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    endpoint listing BankSA banking products (GET /banking/products). Confirmed live
    returning HTTP 200 with an x-v response header (versions 4 and 5 supported) and a
    data.products array of 40 products across categories such as transaction and savings
    accounts, home loans, and credit cards. Conforms to the DSB Consumer Data Standards
    CDR Banking API contract.
- aid: banksa:banksa-cdr-product-detail-api
  name: BankSA CDR Product Detail API
  tags:
  - CDR
  - Open Banking
  - Product Reference Data
  - Banking
  - Public
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-product-detail
  baseURL: https://digital-api.banksa.com.au/cds-au/v1
  properties:
  - url: https://consumerdatastandardsaustralia.github.io/standards/
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-product-detail
    type: APIReference
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right endpoint returning full detail
    for a single product (GET /banking/products/{productId}). Confirmed live returning
    HTTP 200 with an x-v response header (versions 6 and 7 supported). Part of the same
    DSB Consumer Data Standards CDR Banking PRD surface as the product listing endpoint.
