  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right endpoints for recurring-payment
    data sharing - Get Direct Debits For Account (GET
    /banking/accounts/{accountId}/direct-debits), Get Bulk Direct Debits (GET
    /banking/accounts/direct-debits), Get Scheduled Payments For Account (GET
    /banking/accounts/{accountId}/payments/scheduled) and Get Scheduled Payments Bulk (GET
    /banking/payments/scheduled). These require an accredited data recipient acting on the
    consumer's behalf under OAuth2 / OpenID Connect (FAPI) authorization with active
    consent. Standardized by the DSB Consumer Data Standards CDR Banking API (v1.36.0) and
    implemented by BankSA as an accredited data holder within the Westpac Group.
