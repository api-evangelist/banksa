    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#cdr-banking-api_get-transactions-for-account
    type: Specification
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right endpoints for transaction data
    sharing - Get Transactions For Account (GET /banking/accounts/{accountId}/transactions)
    and Get Transaction Detail (GET
    /banking/accounts/{accountId}/transactions/{transactionId}). Requires an accredited
    data recipient acting on the consumer's behalf under the OAuth2 / OpenID Connect (FAPI)
    authorization model with active consent; it is not part of the public unauthenticated
    surface. Standardized by the DSB Consumer Data Standards CDR Banking API (v1.36.0) and
    implemented by BankSA as an accredited data holder within the Westpac Group.
