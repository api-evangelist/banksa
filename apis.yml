    type: Specification
  - url: openapi/banksa-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Consumer-authorized Consumer Data Right endpoints for saved-payee data
    sharing - Get Payees (GET /banking/payees) and Get Payee Detail (GET
    /banking/payees/{payeeId}). Requires an accredited data recipient acting on the
    consumer's behalf under the OAuth2 / OpenID Connect (FAPI) authorization model with
    active consent captured in the customer's Internet Banking data sharing dashboard; it
    is not part of the public unauthenticated PRD surface. Standardized by the DSB Consumer
    Data Standards CDR Banking API (v1.36.0) and implemented by BankSA as an accredited
    data holder within the Westpac Group.
